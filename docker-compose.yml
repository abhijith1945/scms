version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: scms_postgres
    environment:
      POSTGRES_PASSWORD: scms_pass_2025
      POSTGRES_DB: scms_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scms_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: scms_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scms.edu
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    networks:
      - scms_network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  scms_network:
    driver: bridge
